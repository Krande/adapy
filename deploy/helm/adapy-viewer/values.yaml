## Default values for adapy-viewer.
## Override these in your own values.yaml or via --set.

image:
  repository: ghcr.io/krande/adapy-viewer
  tag: ""           # defaults to .Chart.AppVersion when empty
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

## Optional /etc/hosts entries injected into both api and worker pods.
## Useful when an in-cluster service is only reachable via a public
## hostname that resolves to an external IP — point the hostname at the
## ingress controller's ClusterIP instead, so the round-trip stays
## inside the cluster (and works without public DNS / TLS round-trips
## from the pod). Standard Kubernetes shape:
##   hostAliases:
##     - ip: 10.0.0.1
##       hostnames: [auth.example.com]
hostAliases: []

## Deployment timezone. Set to an IANA zone name (e.g. ``Europe/Oslo``)
## to make container logs, Python ``datetime.now()`` (naive paths),
## psql output, and the Postgres session render in that zone. Empty
## leaves the pod's natural TZ (UTC on most base images). Storage of
## ``TIMESTAMPTZ`` columns is unaffected — Postgres always keeps UTC
## internally; this only controls display.
timezone: ""

replicaCount: 1

## Rollout strategy for the API deployment. Defaults to surge-only (no
## unavailability window) so a single-replica deployment still has
## zero-downtime rollouts: k8s starts the new pod, waits for it to become
## Ready, then terminates the old one. Combined with the preStop sleep in
## the deployment template this also avoids 502s from in-flight requests
## landing on a closed listener mid-shutdown.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

## Conversion worker. Pulls source files from storage, converts to GLB,
## writes back under _derived/. Required for IFC/STEP/FEM viewing —
## without it only existing GLB files can be displayed.
worker:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/krande/adapy-viewer-worker
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 2
      memory: 4Gi
    requests:
      cpu: 250m
      memory: 1Gi
  podAnnotations: {}
  ## Free-form env for this pool's container (name -> value, rendered verbatim).
  ## The main use is the streaming-tessellation knobs without a chart release:
  ##   ADA_STEP_STREAM_WORKERS              pool size override (default: cpu quota - 1, max 8)
  ##   ADA_STEP_STREAM_WORKER_SOFT_MEM_MB   idle-recycle threshold (0 disables)
  ##   ADA_STEP_STREAM_WORKER_HARD_MEM_MB   mid-solid kill + requeue-once threshold (0 disables)
  extraEnv: {}
  ## Non-root, matching the viewer/API container. The conversion stack only needs a
  ## writable tmpdir (/tmp, world-writable) and a cache HOME — the worker image points
  ## HOME at a uid-10001-owned dir, so root is not required. (No fsGroup: the S3 storage
  ## backend mounts no volume; add a podSecurityContext.fsGroup if a deploy switches to
  ## a local PVC, and render it in the workerDeployment helper.)
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

## Extra worker pools. Each entry renders as a separate Deployment
## (named ``<release>-worker-<key>``) that shares the env block with
## the base worker. Useful for either capacity (e.g. a high-replica
## pool with its own resource pins) or capability (e.g. an image
## that extends the base worker with extra runtime deps for a
## particular job type).
##
##   extraWorkers:
##     <key>:
##       enabled: true
##       replicaCount: 1
##       image:
##         repository: ...
##         tag: ...
##         pullPolicy: IfNotPresent
##       podAnnotations: {}
##       resources: { ... }
##       securityContext: { ... }
##       capabilities: [<list>]      ## reported to the Workers tab
##       extAllow: [".odb", ".sqlite"]
##                                   ## optional: restrict the pod to
##                                   ## these source suffixes. Routes
##                                   ## become ``ADA_WORKER_EXT_ALLOW``
##                                   ## and gate worker.py's NAK
##                                   ## decision (see worker.py:683).
##                                   ## Use it on capability pools that
##                                   ## FROM the base worker image and
##                                   ## inherit its full reader registry
##                                   ## but should only handle their own
##                                   ## formats — without this they
##                                   ## race the base pool for shared
##                                   ## extensions and a stale pod can
##                                   ## fail jobs the base pod would
##                                   ## have handled.
##       disableBaseConversions: true
##                                   ## optional: scope the pod to its own
##                                   ## capability only — advertise ZERO base
##                                   ## conversions + base source-ext handling
##                                   ## (utilities still register). Renders
##                                   ## ``ADA_WORKER_BASE_CONVERSIONS=false``.
##                                   ## Use for a pool (e.g. weld-gen) that
##                                   ## needs NO base file work at all; the
##                                   ## clean alternative to extAllow, which
##                                   ## can only narrow to a positive suffix
##                                   ## set, not to none. Needs an adapy image
##                                   ## new enough to read the env.
##
## A pool's image is also expected to register any extra
## stream-reader plug-ins at startup (the worker introspects
## ``ada.fem.results.artefacts._STREAM_READERS`` after the plug-ins
## have run and publishes the resulting suffix set to the registry).
## The API merges every online worker's list into /api/config so the
## SPA upload picker picks them up automatically — no per-pool value
## key needed for the suffix list itself.
##
## Empty by default — only the base ``worker`` pool deploys.
extraWorkers: {}

## NATS JetStream — job queue for conversion. When nats.enabled, the
## chart deploys a single-node NATS server with JetStream on a PVC. To
## point at an existing NATS, set nats.enabled=false and nats.url.
nats:
  enabled: true
  url: ""           # external nats:// URL when nats.enabled=false
  image:
    repository: nats
    tag: "2.10-alpine"
    pullPolicy: IfNotPresent
  service:
    clientPort: 4222
    monitorPort: 8222
  persistence:
    enabled: true
    size: 4Gi
    storageClass: ""
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 64Mi

podAnnotations: {}
podSecurityContext: {}
securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

resources:
  limits:
    cpu: 1
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: viewer.local
  tls: []           # [{ secretName: viewer-tls, hosts: [viewer.example.com] }]

## Storage backend served by the API. Either point at an existing
## S3-compatible service (Garage, MinIO, AWS), or enable garage.* below
## to deploy one in-cluster, or use a hostPath/PVC for local mode.
storage:
  kind: s3          # s3 | local
  s3:
    bucket: viewer
    endpoint: ""    # e.g. http://garage:3900 — required for non-AWS
    ## Optional public-facing endpoint used ONLY for presigned URL minting
    ## (large-file browser uploads). Set this when the API talks to the
    ## object store over an in-cluster hostname (e.g. http://garage.garage.
    ## svc.cluster.local:3900) but the browser must reach the same store
    ## over a public HTTPS URL — leaving it empty signs URLs against the
    ## internal endpoint, which the browser then can't resolve and which
    ## triggers Mixed Content blocks under HTTPS pages.
    endpointPublic: ""
    region: garage
    prefix: ""
    virtualHostedStyle: false
    ## Either set credentials inline (chart creates a Secret), or
    ## reference an existing Secret you manage out-of-band.
    existingSecret: ""             # name of an existing Secret (preferred)
    existingSecretKeyId: AWS_ACCESS_KEY_ID
    existingSecretSecretKey: AWS_SECRET_ACCESS_KEY
    accessKeyId: ""
    secretAccessKey: ""
  local:
    ## hostPath or pre-existing PVC. Only used when storage.kind=local.
    hostPath: ""
    existingClaim: ""

## OIDC bearer-token authentication. Provider-agnostic: works with any
## OIDC issuer that publishes a discovery document (Authentik, Azure
## AD direct, Auth0, Keycloak, etc.). When auth.enabled is false the
## API is open — fine for dev / single-tenant / behind another auth
## layer; turn it on for any multi-user deployment.
##
## The viewer uses PKCE (public-client) flow, so client_secret is not
## required and not configured here. The backend verifies tokens
## against the issuer's JWKS — public-key only.
auth:
  enabled: false
  ## Issuer URL — the prefix served by the IdP. Used to build the
  ## discovery URL (<issuer>/.well-known/openid-configuration). Trailing
  ## slashes are stripped server-side.
  issuer: ""
  ## OAuth client id registered with the IdP for this viewer.
  clientId: ""
  ## Token audience. Most IdPs (including Authentik) issue tokens with
  ## aud == client_id; Azure AD v2 splits the two. Falls back to
  ## clientId when blank.
  audience: ""
  ## Group claim value that grants admin access. For Authentik this is
  ## a group name (e.g. "ada-viewer-admins"); for Azure AD it's the
  ## group's object id. Match is exact-string. Blank disables admin.
  adminGroup: ""
  ## HS256 signing secret for the /admin/auth/cli-token mint endpoint.
  ## Reference an existing Secret containing ≥32 bytes of entropy. Leave
  ## existingSecret blank to disable CLI tokens — the mint endpoint will
  ## return 503 but interactive auth is unaffected.
  cliTokenSecret:
    existingSecret: ""
    existingSecretKey: cli_token_secret

## Optional Postgres. When DATABASE_URL is set the viewer enables
## per-project storage tiers, the admin panel, and the audit log.
## Without it the API serves the shared bucket only — fine for tiny
## deployments.
##
## Three modes, in priority order:
##   1. postgres.enabled=true       → chart deploys a single-node
##                                    Postgres StatefulSet (see below)
##                                    and wires DATABASE_URL into the
##                                    api + worker pods automatically.
##   2. database.existingSecret set → external Postgres, DSN read from
##                                    the named Secret. Preferred for
##                                    production (Vault/ESO-managed).
##   3. database.url set            → external Postgres, inline DSN.
##                                    Fine for dev / one-off installs.
##   4. none                        → shared-only mode.
database:
  url: ""
  existingSecret: ""
  existingSecretKey: DATABASE_URL

## Optional bundled Postgres. Off by default — production deployments
## should run Postgres as a separately-managed workload (managed PG,
## CNPG operator, or a per-app StatefulSet in gitops) and point at it
## via database.existingSecret. Enable for self-contained dev / demo
## clusters that just want everything in one helm install.
##
## The StatefulSet runs postgres:16-alpine on a PVC and is reachable
## as <release>-pg.<namespace>.svc on port 5432. Migrations are applied
## by the api pod on startup; no init scripts here.
postgres:
  enabled: false
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  database: adapy_viewer
  username: adapy_viewer
  ## Password resolution: if existingSecret is set, the chart references
  ## that Secret (preferred for any non-toy deployment). Otherwise
  ## password is read inline — it MUST be set explicitly when bundled
  ## Postgres is enabled, no surprise random defaults.
  password: ""
  existingSecret: ""
  existingSecretPasswordKey: password
  service:
    port: 5432
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

## Optional bundled Garage. Off by default — most users will point the
## API at an existing Garage. Enable for a self-contained demo cluster.
garage:
  enabled: false
  image:
    repository: dxflrs/garage
    tag: v1.0.1
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  ## Garage admin token used by the chart to bootstrap a layout/bucket.
  ## Replace in production; this default is a placeholder so dev/demo
  ## works without extra setup.
  rpcSecret: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcd
  adminToken: garage-admin-token-change-me
  service:
    s3Port: 3900
    rpcPort: 3901
    adminPort: 3903
