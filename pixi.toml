# Editable installs
[feature.tests.pypi-dependencies]
pytest-playwright = "*"

[feature.lint.dependencies]
black = "==24.4.2"
isort = "==5.13.2"
ruff = "==0.12.8"

flatbuffers = "==25.2.10"
python-flatbuffers = "==25.2.10"
