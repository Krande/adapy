name: Publish images

# Builds the adapy deploy images and pushes them to this repo's GitHub
# Container Registry namespace (ghcr.io/<owner>/adapy-<name>). Auth is the
# built-in GITHUB_TOKEN — no external secrets required (mirrors the paradoc
# publish-image.yaml pattern).
#
# Images:
#   adapy-viewer            deploy/Dockerfile.viewer       (FROM the adacpp wasm base)
#   adapy-worker            deploy/Dockerfile.worker
#   adapy-docs              deploy/Dockerfile.docs
#
# The OCCT→wasm wheel is no longer cross-compiled here. adacpp publishes its
# own reusable base image on tag (ghcr.io/krande/adacpp-wasm-base:<ver>, wheel
# + manifest under /out/); the viewer build FROMs it via the ADACPP_WASM_BASE
# build-arg below. Bump that pin when adopting a newer adacpp release.
#
# We only push on tag: a tag push `v1.2.3` publishes :1.2.3, :1.2, :latest and
# :sha-<short> for every image. workflow_dispatch is available for manual
# re-runs but is not part of the normal release flow.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

# The prebuilt adacpp pyodide wasm base the viewer FROMs. Published by adacpp's
# own publish-wasm-base workflow on tag (wheel + manifest under /out/). Pinned to
# a release so viewer builds are reproducible — the pin is the ADACPP_BASE_IMAGE
# ARG default in deploy/Dockerfile.viewer, not here; see the viewer build step.
# NOTE: this is a cross-repo ghcr package; it must be public (or grant the
# adapy repo read access) for the GITHUB_TOKEN pull below to resolve it.

jobs:
  viewer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-viewer
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      # Built locally first so the smoke test below can gate the push. The publish itself is the
      # step after next; this one loads the image into the runner's docker instead.
      - name: Build viewer image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deploy/Dockerfile.viewer
          push: false
          load: true
          tags: adapy-viewer:smoke
          # ADACPP_BASE_IMAGE is deliberately NOT passed: the pin is the ARG default in
          # deploy/Dockerfile.viewer, and an unpassed build-arg lets that default stand.
          # This used to restate the version as ADACPP_WASM_BASE, which drifted to 0.13.2
          # while the Dockerfile said 0.14.0 — and a passed build-arg WINS over the ARG
          # default, so the stale value is what shipped and bumping the Dockerfile did
          # nothing. Pass this arg only to build against something other than the pin.
          build-args: |
            IMAGE_TAG=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=viewer
          cache-to: type=gha,mode=max,scope=viewer

      # The viewer runtime ships a CURATED subset of ada, and nothing else verifies the subset is
      # complete — the test suite and the worker image both have all of src/ada on the path. 0.30.0
      # released a viewer that crashlooped on `No module named 'ada.cad'` with every check green.
      # See deploy/viewer-smoke.py.
      - name: Smoke-test the viewer image
        run: |
          docker run --rm -i --entrypoint sh adapy-viewer:smoke \
            -c 'exec /env/bin/python -' < deploy/viewer-smoke.py

      # Re-runs the same build to publish it: every layer is a gha cache hit, so this is an export,
      # not a rebuild — and a tag whose image can't start never gets published.
      - name: Push viewer image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deploy/Dockerfile.viewer
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_TAG=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=viewer

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Dockerfile.worker's adacpp-overlay stage does `COPY adacpp-src/ ./adacpp-src/`, which
      # fails if the path is absent ("/adacpp-src": not found). Release builds use the pinned
      # conda ada-cpp (no branch overlay), so stage an empty dir — the overlay stage detects no
      # pyproject.toml and disables itself.
      - name: Stage empty adacpp-src (release uses the pinned conda ada-cpp)
        run: mkdir -p adacpp-src

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-worker
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deploy/Dockerfile.worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_TAG=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # docs/conf.py derives the footer release string from git describe,
          # so the build needs tags (passed in as ADA_DOCS_RELEASE/_DATE).
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-docs
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Resolve docs release metadata
        id: docsmeta
        run: |
          echo "release=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
          echo "date=$(git show -s --format=%ad --date=short)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deploy/Dockerfile.docs
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_TAG=${{ steps.meta.outputs.version }}
            ADA_DOCS_RELEASE=${{ steps.docsmeta.outputs.release }}
            ADA_DOCS_DATE=${{ steps.docsmeta.outputs.date }}
          cache-from: type=gha,scope=docs
          cache-to: type=gha,mode=max,scope=docs
