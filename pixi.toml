[workspace]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64"]

[feature.lint.tasks]
lint = "black . --config pyproject.toml && ruff check . --fix && isort ."
flat = { cmd = "python src/flatbuffers/update_flatbuffers.py && pixi run lint", cwd = "./" }

json-code-gen-py = { cmd = [
    "datamodel-codegen",
    "--input", "src/gltf_extension_schema",
    "--input-file-type", "jsonschema",
    "--output", "src/ada/extension",
    "--output-model-type", "pydantic_v2.BaseModel"], cwd = "./" }

[feature.docs.tasks]
# `docs` chains fea-doc → sphinx-build via depends-on. In the Dockerfile.docs
# CI image we ship a sibling paradoc checkout at /work/paradoc plus the
# verification_report dir, so the chain runs end-to-end during image build.
# Locally, the same chain works as long as paradoc is cloned alongside adapy.
docs = { cmd = "cd docs && sphinx-build -b html -v -D nbsphinx_execute=auto . _build/html", depends-on = ["fea-doc"], env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
serve = { cmd = "python docs/main.py", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" }, depends-on = ["docs"] }
# FEA verification report → paradoc static-web bundle landing under
# `docs/_static/fea-report/`. Runs calculix + code_aster (available in
# the `docs` env via fem-deps) for every case and bakes fresh
# per-(case, mode) deformed-mesh GLBs into `_assets/`. The `false true`
# args mean overwrite=False (reuse intermediate FEA outputs if present)
# and execute=True (actually invoke the solvers).
fea-doc = { cmd = "python build_verification_report.py false true --regen-assets", cwd = "./tests/fem/verification_report", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src:$PIXI_PROJECT_ROOT/../paradoc/src" } }
# Force-regen with overwrite=True — rerun every case even if cached.
fea-doc-clean = { cmd = "python build_verification_report.py true true --regen-assets", cwd = "./tests/fem/verification_report", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src:$PIXI_PROJECT_ROOT/../paradoc/src" } }

[feature.tests.tasks]
pre-install = { cmd = "playwright install --with-deps chromium", outputs = ["$PIXI_HOME/envs/tests/Scripts/playwright.exe"] }

test = { cmd = "pytest tests --ignore=tests/profiling --ignore=tests/fem --durations=0", depends-on = ["pre-install"], env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
test-core = { cmd = "pytest tests/core --durations=0", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
test-full = { cmd = "pytest tests/full --durations=0", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
test-cov = { cmd = "pytest tests --ignore=tests/profiling --ignore=tests/fem --cov=src/ada --cov-report=html --cov-report=term --durations=0", depends-on = ["pre-install"], env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }

[feature.fem.tasks]
test-all = { cmd = "pytest tests --durations=0", depends-on = ["pre-install"], env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
test-fem = { cmd = "pytest tests/fem --durations=0", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
test-basic-fem = { cmd = "python basic_fem.py", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" }, cwd = "examples" }
test-fem-viz = { cmd = "pytest tests/fem/visualization --durations=0", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }

print-paths = { cmd = "python -c \"import sys, os; print('\\n'.join(sys.path + os.environ.get('PYTHONPATH', '').split(os.pathsep)))\"" }

[feature.frontend.tasks]
npm = { cmd = "npm", cwd = "./src/frontend" }
winstall = { cmd = "npm install", cwd = "./src/frontend", outputs = ["$PIXI_PROJECT_ROOT/src/frontend/node_modules"] }
wdev = { cmd = "npm run dev", cwd = "./src/frontend", depends-on = ["winstall"] }
wbuild = { cmd = "npm run build", cwd = "./src/frontend", depends-on = ["winstall"] }
fdepcheck = { cmd = "depcheck", cwd = "./src/frontend", depends-on = ["winstall"] }

json-code-gen-ts = { cmd = [
    "npx", "--yes", "-p", "json-schema-to-typescript", "json2ts",
    "--input","design_and_analysis_extension.schema.json",
    "--output","$PIXI_PROJECT_ROOT/src/frontend/src/extensions/design_and_analysis_extension.d.ts"], depends-on = ["json-code-gen-py"], env = { "npm_config_cache" = "$PIXI_PROJECT_ROOT/temp/npm_config" }, cwd="src/gltf_extension_schema/" }

[feature.profile.tasks]
benchmark-profile = { cmd = "python scripts/benchmark_profile.py", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
scalene = { cmd = "scalene --json -m pytest ./tests/profiling --outfile=profile.json", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
cprofile = { cmd = "python -m cProfile -o profile.prof -m pytest ./tests/profiling", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
pyprofile = { cmd = "pyinstrument -m pytest ./tests/profiling", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
pyprofile-all = { cmd = "pyinstrument -m pytest ./tests", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
pyprofile-html = { cmd = "pyinstrument -r html -o profile_profiling_tests.html -m pytest ./tests/profiling", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
pyprofile-html-all = { cmd = "pyinstrument -r html -o profile_all_tests.html -m pytest ./tests", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }


[environments]
# ``prod`` is the all-features env most local workflows (jupyter,
# rendering, plot export) use — it composes ``prod`` + ``desktop``.
# Slim runtime envs that don't need Jupyter / pygfx (notably
# ``viewer-api`` for the REST worker image) deliberately omit
# ``desktop`` to keep the image lean.
prod = { features = ["prod", "desktop"], solve-group = "prod", no-default-feature = true }
lint = { features = ["lint"], no-default-feature = true }
profile = { features = ["profile", "prod", "desktop"], solve-group = "prod", no-default-feature = true }
frontend = { features = ["frontend"], no-default-feature = true }
jupyterlite = { features = ["jupyterlite"], no-default-feature = true }

tests-core = { features = ["tests-core"], no-default-feature = true }
# Local smoke loop for the cad backend abstraction against the adacpp
# wasm wheel. No pythonocc-core in this env — the whole point is to
# prove the pyodide path stays clean. ADACPP_WHEEL points at a built
# wheel; defaults to ../adacpp/dist/ada_cpp-*.whl.
test-pyodide = { features = ["test-pyodide"], no-default-feature = true }
tests = { features = ["tests", "tests-core", "prod", "desktop"], solve-group = "prod", no-default-feature = true }
fem-deps = { features = ["fem-deps", "prod", "tests-core"], no-default-feature = true }
fem = { features = ["fem", "prod", "desktop", "tests-core", "fem-deps"], no-default-feature = true }
docs = { features = ["docs", "prod", "desktop", "fem-deps", "tests-core"], no-default-feature = true }
# Worker image — REST API + file converter only. No Jupyter, no pygfx,
# no plotly. Code paths gated behind those imports are unreachable from
# the worker entrypoint (see ``feature.desktop`` for the inventory).
viewer-api = { features = ["viewer-api", "prod"], solve-group = "prod", no-default-feature = true }
# Separate test env for the REST viewer module: layers pytest on top
# of the runtime deps so the production `viewer-api` image stays slim.
viewer-api-tests = { features = ["viewer-api", "tests-core", "prod"], solve-group = "prod", no-default-feature = true }
# Test env for the meshio-bridge format adapters (XDMF + .mesh / .vtu /
# etc. via meshio.write). Layers pytest on top of prod + the optional
# meshio-bridge feature so the parity test against meshio's reader
# can run in CI without putting meshio back into prod itself.
meshio-bridge = { features = ["meshio-bridge", "prod", "desktop"], solve-group = "prod", no-default-feature = true }
meshio-bridge-tests = { features = ["meshio-bridge", "tests-core", "prod", "desktop"], solve-group = "prod", no-default-feature = true }

[feature.jupyterlite.dependencies]
jupyterlite-core = "*"

[feature.meshio-bridge.dependencies]
# meshio is unmaintained but still useful as an optional bridge for
# XDMF / mesh / vtu / etc. — opt in by depending on this feature.
meshio = "*"

[feature.prod.dependencies]
python = "3.12.*"
bcf-client = "*"
numpy = "*"
hdf5 = "*"
h5py = "*"
ifcopenshell = "*"
# Pin to the `novtk` build of the OpenCASCADE conda-forge feedstock —
# the default `all_*` build links VTK, which drags in libxkbcommon /
# mesa-libGL / X11 client libs we don't render through anyway. The
# `novtk` variant strips that whole tree out. pythonocc-core has the
# matching variant; they must agree on the build string or the solver
# picks the vtk-enabled occt to satisfy pythonocc-core.
pythonocc-core = { version = "*", build = "novtk_*" }
python-gmsh = "*"
pyquaternion = "*"
trimesh = "*"
occt = { version = "*", build = "novtk_*" }
websockets = ">=14"
pyparsing = "*"
flatbuffers = "*"
python-flatbuffers = "*"
lark = "*"
pillow = "*"
pydantic = "*"

# Desktop / notebook / static-export deps. Split out of `prod` so the
# slim REST worker image (which only does file conversion) doesn't have
# to ship the entire pygfx → wgpu-py → imgui-bundle → libopencv (qt6
# build) → ffmpeg → libopenvino-* closure plus Jupyter — that closure
# alone is ~260 MiB on the resolved env, and the worker doesn't import
# any of it.
#
# Code paths gated behind these imports (verified with grep -r):
#   * ada.visit.rendering.*           → pygfx / pyglfw / glfw / wgpu
#   * ada.calc.beams (display widget) → ipywidgets   (local import)
#   * ada.core.curve_utils plots      → plotly       (local import)
#   * ada.visit.plots                 → plotly       (local import)
#   * ada.fem.formats.utils safe-del  → send2trash   (local import,
#                                                     gated on Config
#                                                     general_safe_deletion)
#
# Envs that face users in notebooks / desktop pipelines (``prod``,
# ``tests``, ``fem``, ``docs``, ``profile``, ``meshio-bridge*``) add
# this feature back in. ``viewer-api`` / ``viewer-api-tests`` deliberately
# don't — that's the saving.
[feature.desktop.dependencies]
notebook = "*"      # For the notebook
ipywidgets = "*"
jupyterlab = "*"
plotly = "*"
python-kaleido = ">=1.0.0"
pygfx = ">=0.13"
glfw = "==3.4"
pyglfw = "*"
send2trash = "*"

[feature.prod.target.win-64.dependencies]
# Needed to fix issue with running from pycharm locally (llvm-openmp only works from pixi shell).
intel-openmp = "*"

# For local development
[feature.prod.target.win-64.activation.env]
PYTHONPATH="%PIXI_PROJECT_ROOT%/src"

[feature.fem-deps]
channels = ["conda-forge"]
[feature.fem]
channels = ["conda-forge"]
[feature.docs]
channels = ["conda-forge"]


[feature.fem-deps.dependencies]
calculix = "*"

[feature.fem-deps.target.linux-64.dependencies]
