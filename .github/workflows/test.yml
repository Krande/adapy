name: ci-branch-tests


on: push

concurrency:
  group: ada-quick-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-core:
    name: Test ada-py-core
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - uses: prefix-dev/setup-pixi@v0.10.0 # https://github.com/prefix-dev/setup-pixi
        with:
          pixi-version: v0.68.0
          environments: tests
          cache: true

      - name: Runs Tests
        run: pixi run -e tests test-core

  test-full:
    name: Test ada-py-full
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.68.0
          environments: >-
            tests
            frontend
          cache: true

      - name: Run Build latest web
        run: pixi run wbuild

      - name: Run Tests
        run: pixi run -e tests test-full

  test-fem:
    name: Test ada-py-fem
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.68.0
          environments: >-
            fem
          cache: true

      - name: Run Tests
        run: pixi run test-fem

  test-adacpp:
    name: Test ada-cpp integration
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.68.0
          environments: >-
            tests-adacpp
          cache: true

      - name: Run Tests
        run: pixi run -e tests-adacpp test-core

  test-rest:
    name: Test viewer REST API
    runs-on: ubuntu-latest
    # tests/comms/rest is excluded from the core/full/pr tasks because it needs
    # the viewer-api stack; run it here with a live Postgres so the DB-backed
    # admin/audit tests actually execute instead of skipping.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: adapytest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.68.0
          environments: >-
            viewer-api-tests
            viewer-api-tests-adacpp
          cache: true

      - name: Run Tests
        env:
          ADA_TEST_POSTGRES_URL: postgresql://postgres:test@localhost:5432/adapytest
        run: pixi run -e viewer-api-tests test-rest

      # Streaming-path coverage: re-run the adacpp_stream-marked REST tests against the native
      # ada-cpp backend (tessellate_stream / NGEOM libtess2), which the adacpp-less viewer-api-tests
      # leg above can only cover via the OCC object-path fallback. No Postgres needed.
      - name: Run streaming-path tests (ada-cpp backend)
        run: pixi run -e viewer-api-tests-adacpp test-rest-adacpp