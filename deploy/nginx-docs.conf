server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # The paradoc bundle ships GLBs under _static/fea-report/assets/3d/
    # as plain application/octet-stream. Plotly JSON sections and the
    # large index.html are also compressible. gzip_vary lets caches key
    # by Accept-Encoding; gzip_proxied any covers Tailscale / Traefik
    # paths that mark requests proxied.
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/octet-stream
        model/gltf-binary
        image/svg+xml;

    location / {
        try_files $uri $uri/ =404;
    }

    # Hand `.glb` a real MIME type so the browser caches and inspects it
    # correctly. nginx-unprivileged ships /etc/nginx/mime.types but
    # doesn't map glb out of the box.
    location ~ \.glb$ {
        default_type model/gltf-binary;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
