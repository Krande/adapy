fastapi = "*"  # For the API docs
pandas = "*"

[feature.viewer-api.dependencies]
fastapi = "*"
uvicorn = "*"
obstore = "*"
nats-py = "*"
# OIDC token verification (REST mode only). pyjwt[crypto] pulls in
# `cryptography` for RS256/ES256 signature checks against JWKS keys.
pyjwt = "*"
cryptography = "*"
httpx = "*"
# Optional: project membership + audit log live in Postgres when the
# deployment opts into it via DATABASE_URL. Without DATABASE_URL the
# REST viewer runs in shared-only mode and asyncpg goes unused.
asyncpg = "*"
# psutil powers the worker's per-job CPU / RSS / IO sampling that
# feeds the admin panel's metrics view. Cross-platform; Linux gives
# the full picture (incl. io_counters), macOS skips IO.
psutil = "*"

[feature.viewer-api.tasks]
viewer-api = { cmd = "python -m ada.comms.rest", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
viewer-worker = { cmd = "python -m ada.comms.rest.worker", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
# Pull a failed conversion's source blob to ./audit_repro/<id>/. Needs
# ADAPY_API_TOKEN (mint via admin panel) + ADAPY_API_BASE.
audit-fetch = { cmd = "python scripts/audit_fetch.py", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
# Run the converter directly on a previously-fetched (or just-fetched)
# audit source. Bypasses REST/queue — fastest loop for debugging a
# specific failure.
audit-repro = { cmd = "python scripts/audit_repro.py", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
# Upload a local file to the viewer as a source blob (any format the
# viewer accepts: GLB, IFC, STEP, SAT, XML, SIF). Same auth env as
# audit-fetch (ADAPY_API_TOKEN + ADAPY_API_BASE).
viewer-upload = { cmd = "python scripts/viewer_upload.py", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
# Compare two GLBs face-by-face (centroid + normal alignment) and
# bucket subject-mesh primitives into OK / POS_OK_ROT_BAD /
# POS_BAD_ROT_OK / WHOLLY_BAD. Optional ``--out`` writes per-bucket
# GLBs + per_face.json so the failure modes can be inspected
# visually + chased in code.
glb-face-classify = { cmd = "python scripts/glb_face_classify.py", env = { "PYTHONPATH" = "$PIXI_PROJECT_ROOT/src" } }
# Static server for the Pyodide IFC->GLB experiment. Web Workers refuse
# to run from file:// URLs, so this hands the directory at port 8088.
pyodide-experiment = { cmd = "python -m http.server 8088", cwd = "experiments/pyodide-converter" }

[feature.frontend.dependencies]
nodejs = "*"
flatbuffers = "==25.2.10"

[feature.test-pyodide.dependencies]
nodejs = "*"

[feature.test-pyodide.tasks]
install-pyodide = { cmd = "npm install", cwd = "tools/pyodide-test", outputs = ["tools/pyodide-test/node_modules"] }
test-pyodide-cad = { cmd = "node test_pyodide_cad.js", cwd = "tools/pyodide-test", depends-on = ["install-pyodide"] }

[dependencies]
pixi-pycharm = ">=0.0.8,<0.0.9"

[feature.jupyterlite.tasks]
jl-init = { cmd = "jupyter lite init", cwd = "./src/jupyterlite" }
jl-build = { cmd = "jupyter lite build --output-dir=dist", cwd = "./src/jupyterlite" }
jl-serve = { cmd = "jupyter lite serve --output-dir=dist --port=8899", cwd = "./src/jupyterlite" }
