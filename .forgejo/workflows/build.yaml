name: Build viewer + worker images

# Single workflow that builds the viewer (slim API + SPA) and worker
# (fat pixi env) images in parallel, then writes a single gitops
# commit covering whichever image(s) actually built.
#
# Runs only on the self-hosted runner labelled `docker-build`. GitHub
# Actions does not have that label, so this workflow is a no-op when
# the branch is pushed to GitHub. All registry/gitops endpoints come
# from secrets so the workflow file itself reveals no infrastructure
# details.
#
# Why one workflow with three jobs instead of two workflows + a
# cross-workflow trigger:
# * gitops bump becomes one commit per push (not two), and there's no
#   clone/push race between two jobs hitting the same manifest;
# * `needs:` cleanly handles "wait for both builds before committing,
#   but bump whichever subset succeeded";
# * each image still skips its own build when its paths weren't
#   touched — the per-job `if:` gates on the detect job's outputs.

# Cancel an in-flight run for the same branch when a new push lands.
# Without this, two overlapping runs race at the gitops-commit step:
# an older run (slow worker build) can finish AFTER a newer
# viewer-only run, overwriting the newer image tag with the older
# SHA in the gitops manifest. The existing rebase-retry loop handles
# concurrent writes from different branches but not the same-branch
# stale-overwrite case. cancel-in-progress means only the latest
# push's run reaches gitops; a worker build from the older SHA gets
# scrapped, which is acceptable since the next push usually re-
# touches the same code anyway.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: [feat/v0_8]
    paths:
      # Union of viewer and worker rebuild scopes. The detect job
      # below splits per-image so a parser-only change rebuilds only
      # the worker, a frontend-only change rebuilds only the viewer,
      # etc.
      - 'src/ada/**'
      - 'src/frontend/**'
      - 'pixi.toml'
      - 'pixi.lock'
      - 'pyproject.toml'
      - 'deploy/Dockerfile.viewer'
      - 'deploy/Dockerfile.worker'
      - 'deploy/Dockerfile.docs'
      - 'deploy/viewer-ada-init.py'
      - 'docs/**'
      - 'verification/**'
      - '.forgejo/workflows/build.yaml'

jobs:
  detect:
    runs-on: docker-build
    outputs:
      viewer: ${{ steps.filter.outputs.viewer }}
      worker: ${{ steps.filter.outputs.worker }}
      docs: ${{ steps.filter.outputs.docs }}
      base_changed: ${{ steps.filter.outputs.base_changed }}
      run_start_epoch: ${{ steps.filter.outputs.run_start_epoch }}
    steps:
      - uses: actions/checkout@v4
        with:
          # We diff against github.event.before; checkout depth must
          # cover that commit. fetch-depth: 0 fetches the full history
          # — heavier than necessary but the repo is small enough that
          # it doesn't matter, and it covers force-push / first-push
          # edge cases without per-event tuning.
          fetch-depth: 0

      - id: filter
        run: |
          # Capture run-start epoch up front. viewer-build later
          # compares it against Harbor's push_time on the adacpp
          # base ``:latest`` tag to know whether the parallel
          # base-image rebuild has caught up.
          run_start_epoch=$(date +%s)

          # Compare against the previous tip. workflow_dispatch and
          # the initial branch push (before=000…) both lack a parent
          # — fall back to "build everything" so the manual trigger
          # is always useful and a fresh branch ships both images.
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=""
          else
            CHANGED=$(git diff --name-only "$BEFORE" "$GITHUB_SHA")
          fi

          match() {
            # Empty diff → "no info, build everything" (manual + first push)
            [ -z "$CHANGED" ] && return 0
            echo "$CHANGED" | grep -qE "$1"
          }

          # Viewer image is the slim API + bundled SPA. ada.* under
          # the runtime is only comms/** + config.py (see
          # deploy/Dockerfile.viewer); CAD/FEM parsers are unused
          # here, so a cadit-only change should not rebuild it.
          viewer=false
          if match '^src/ada/comms/' || \
             match '^src/ada/config\.py$' || \
             match '^src/frontend/' || \
             match '^deploy/Dockerfile\.viewer$' || \
             match '^deploy/viewer-ada-init\.py$' || \
             match '^\.forgejo/workflows/build\.yaml$'; then
            viewer=true
          fi

          # Worker COPY src/ in wholesale via pixi, so any change
          # under src/ada is potentially runtime-affecting.
          worker=false
          if match '^src/ada/' || \
             match '^pixi\.(toml|lock)$' || \
             match '^pyproject\.toml$' || \
             match '^deploy/Dockerfile\.worker$' || \
             match '^\.forgejo/workflows/build\.yaml$'; then
            worker=true
          fi

          # Docs image is a Sphinx static site (deploy/Dockerfile.docs)
          # that also bundles the paradoc-backed FEA verification report.
          # Rebuild on docs/**, the report source tree, pixi env files,
          # the Dockerfile, or the workflow itself.
          docs=false
          if match '^docs/' || \
             match '^src/ada/' || \
             match '^pixi\.(toml|lock)$' || \
             match '^pyproject\.toml$' || \
             match '^verification/' || \
             match '^deploy/Dockerfile\.docs$' || \
             match '^\.forgejo/workflows/build\.yaml$'; then
            docs=true
          fi

          # Adacpp-wasm base image rebuild: triggered by the sibling
          # build-adacpp-base workflow on these same paths. Tracking
          # them here lets viewer-build wait for the parallel run to
          # finish before pulling ``:latest``.
          #
          # Important: the sibling workflow only fires on push events
          # matching those paths. On `workflow_dispatch` (CHANGED is
          # empty) or a first push (BEFORE = 000…) the generic `match`
          # would return success and we'd wait 30 minutes for a
          # sibling base build that never fires. Gate on a *real*
          # diff before flipping the flag.
          base_changed=false
          if [ -n "$CHANGED" ]; then
            if echo "$CHANGED" | grep -qE '^deploy/Dockerfile\.adacpp-wasm$' || \
               echo "$CHANGED" | grep -qE '^\.forgejo/workflows/build-adacpp-base\.yaml$'; then
              base_changed=true
            fi
          fi

          {
            echo "viewer=$viewer"
            echo "worker=$worker"
            echo "docs=$docs"
            echo "base_changed=$base_changed"
            echo "run_start_epoch=$run_start_epoch"
          } >> "$GITHUB_OUTPUT"
          echo "Detected — viewer: $viewer, worker: $worker, docs: $docs, base_changed: $base_changed (run_start_epoch=$run_start_epoch)"

  viewer-build:
    needs: detect
    if: needs.detect.outputs.viewer == 'true'
    runs-on: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Login to registry
        run: |
          mkdir -p ~/.docker
          printf '%s' '${{ secrets.REGISTRY_DOCKER_CONFIG }}' > ~/.docker/config.json

      - name: Wait for adacpp base rebuild (if any)
        # When the same push touched ``Dockerfile.adacpp-wasm`` or its
        # workflow, the sibling build-adacpp-base run is racing in
        # parallel. Block here until the base ``:latest`` push_time
        # in Harbor exceeds this run's start, so viewer-build doesn't
        # FROM a stale base. No-op when nothing relevant changed.
        if: needs.detect.outputs.base_changed == 'true'
        env:
          ADACPP_BASE_IMAGE: ${{ secrets.ADACPP_BASE_IMAGE }}
          RUN_START_EPOCH: ${{ needs.detect.outputs.run_start_epoch }}
        run: |
          set -e
          if [ -z "$ADACPP_BASE_IMAGE" ]; then
            echo "::warning::base_changed=true but ADACPP_BASE_IMAGE secret is unset; skipping wait."
            exit 0
          fi
          # Derive Harbor v2 artifact URL from the image reference
          # without hardcoding hostnames (the secret carries the
          # registry; we only crack it apart here).
          path="${ADACPP_BASE_IMAGE%:*}"            # strip ``:tag``
          host="${path%%/*}"
          rest="${path#*/}"
          project="${rest%%/*}"
          repo="${rest#*/}"
          api_url="https://${host}/api/v2.0/projects/${project}/repositories/${repo}/artifacts/latest"
          # jq isn't preinstalled on the alpine docker runner image.
          command -v jq >/dev/null 2>&1 || apk add --no-cache jq >/dev/null
          # Bound the wait — a failed sibling build shouldn't hang
          # the viewer build forever. 30 min covers the OCCT compile
          # plus push.
          DEADLINE=$(( RUN_START_EPOCH + 1800 ))
          while :; do
            now=$(date +%s)
            # Pull the artifact metadata. Harbor returns 404 for the
            # tag during the brief window between manifest write and
            # tag promotion — treat as "not ready yet".
            push_time=$(curl -sf "$api_url" 2>/dev/null \
              | jq -r '(.tags // []) | map(select(.name=="latest")) | .[0].push_time // ""' \
              || echo "")
            if [ -n "$push_time" ]; then
              # Harbor returns ISO 8601 with trailing ``.NNN``+``Z``.
              # ``date -d`` on busybox accepts the trimmed form.
              push_epoch=$(date -u -d "$(echo "$push_time" | cut -d. -f1 | tr T ' ')" +%s 2>/dev/null || echo 0)
              if [ "$push_epoch" -ge "$RUN_START_EPOCH" ]; then
                echo "Base ``:latest`` is fresh — push_time=$push_time (epoch $push_epoch >= run_start $RUN_START_EPOCH). Proceeding."
                exit 0
              fi
              echo "Base ``:latest`` push_time=$push_time (epoch $push_epoch) is older than run_start $RUN_START_EPOCH; waiting…"
            else
              echo "Base ``:latest`` not resolvable yet (sibling build still running?); waiting…"
            fi
            if [ "$now" -ge "$DEADLINE" ]; then
              echo "::error::Timed out after 30 min waiting for adacpp base rebuild. Check the build-adacpp-base workflow run."
              exit 1
            fi
            sleep 30
          done

      - name: Build and push viewer image
        env:
          REGISTRY_IMAGE: ${{ secrets.VIEWER_REGISTRY_IMAGE }}
          # Full reference to the prebuilt adacpp-wasm base image
          # (e.g. ``<registry>/<repo>/adacpp-wasm-base:adacpp-<sha7>``
          # or ``…:latest``). Built by the build-adacpp-base workflow
          # whenever the OCCT-wasm cross-compile needs to refresh —
          # NOT rebuilt by this viewer-build job, so cache evictions
          # don't trigger a 30-minute OCCT recompile every push.
          ADACPP_BASE_IMAGE: ${{ secrets.ADACPP_BASE_IMAGE }}
        run: |
          if [ -z "$REGISTRY_IMAGE" ]; then
            echo "::error::VIEWER_REGISTRY_IMAGE secret is not set on this repo. Configure it (and REGISTRY_DOCKER_CONFIG) under Settings → Actions → Secrets before re-running."
            exit 1
          fi
          if [ -z "$ADACPP_BASE_IMAGE" ]; then
            echo "::error::ADACPP_BASE_IMAGE secret is not set. Run the build-adacpp-base workflow first and set this secret to the resulting image reference (e.g. ``<registry>/<repo>/adacpp-wasm-base:adacpp-<sha7>`` or ``…:latest``)."
            exit 1
          fi
          # Pull the base ahead of the viewer build so a missing tag
          # fails loudly here, not buried in BuildKit output. The
          # ``--no-cache=true`` ensures we get the fresh manifest if
          # the prior wait step just unblocked on a new push.
          docker pull "${ADACPP_BASE_IMAGE}"
          TAG="sha-${GITHUB_SHA::7}"
          BRANCH_TAG="branch-$(printf '%s' "$GITHUB_REF_NAME" | tr '/' '-')"
          docker build \
            -f deploy/Dockerfile.viewer \
            --build-arg "IMAGE_TAG=${TAG}" \
            --build-arg "ADACPP_BASE_IMAGE=${ADACPP_BASE_IMAGE}" \
            -t "${REGISTRY_IMAGE}:${TAG}" \
            -t "${REGISTRY_IMAGE}:${BRANCH_TAG}" \
            .
          docker push "${REGISTRY_IMAGE}:${TAG}"
          docker push "${REGISTRY_IMAGE}:${BRANCH_TAG}"

  worker-build:
    needs: detect
    if: needs.detect.outputs.worker == 'true'
    runs-on: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Login to registry
        run: |
          mkdir -p ~/.docker
          printf '%s' '${{ secrets.REGISTRY_DOCKER_CONFIG }}' > ~/.docker/config.json

      - name: Build and push worker image
        env:
          REGISTRY_IMAGE: ${{ secrets.WORKER_REGISTRY_IMAGE }}
        run: |
          if [ -z "$REGISTRY_IMAGE" ]; then
            echo "::error::WORKER_REGISTRY_IMAGE secret is not set on this repo. Configure it (and REGISTRY_DOCKER_CONFIG) under Settings → Actions → Secrets before re-running."
            exit 1
          fi
          TAG="sha-${GITHUB_SHA::7}"
          BRANCH_TAG="branch-$(printf '%s' "$GITHUB_REF_NAME" | tr '/' '-')"
          docker build \
            -f deploy/Dockerfile.worker \
            --build-arg "IMAGE_TAG=${TAG}" \
            -t "${REGISTRY_IMAGE}:${TAG}" \
            -t "${REGISTRY_IMAGE}:${BRANCH_TAG}" \
            .
          docker push "${REGISTRY_IMAGE}:${TAG}"
          docker push "${REGISTRY_IMAGE}:${BRANCH_TAG}"

      - name: Trigger downstream rebuild (optional)
        env:
          # Optional fan-out. When all three secrets are set, this
          # POSTs a workflow_dispatch to a downstream forgejo repo
          # so an image that FROM's this worker can rebuild on top of
          # the freshly-pushed base. Keep the dispatch generic — the
          # URL / token / ref live in secrets so adapy itself doesn't
          # reference any specific downstream by name.
          URL: ${{ secrets.DOWNSTREAM_DISPATCH_URL }}
          TOKEN: ${{ secrets.DOWNSTREAM_DISPATCH_TOKEN }}
          REF: ${{ secrets.DOWNSTREAM_DISPATCH_REF }}
        run: |
          if [ -z "$URL" ] || [ -z "$TOKEN" ] || [ -z "$REF" ]; then
            echo "downstream dispatch not configured — skipping."
            exit 0
          fi
          # The docker-build runner image carries the docker CLI but
          # not curl, so we run curl as a one-off container against
          # the same daemon. -sS keeps stderr quiet on success but
          # surfaces a real error if the request fails.
          resp=$(docker run --rm \
            -e URL -e TOKEN -e REF \
            curlimages/curl:8.10.1 -sS -o - -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            "$URL" -d "{\"ref\":\"$REF\"}")
          body=$(printf '%s\n' "$resp" | head -n -1)
          code=$(printf '%s\n' "$resp" | tail -n 1)
          if [ "$code" != "204" ] && [ "$code" != "200" ]; then
            echo "::warning::downstream dispatch returned HTTP $code; downstream rebuild not triggered"
            printf '%s\n' "$body" | head -c 500
            exit 0
          fi
          echo "Downstream dispatch sent (HTTP $code)."

  docs-build:
    needs: detect
    if: needs.detect.outputs.docs == 'true'
    runs-on: docker-build
    steps:
      - uses: actions/checkout@v4
        with:
          # docs/conf.py shells out to ``git describe`` to derive the
          # release string baked into the rendered footer. Default
          # shallow clone has no tags, so widen the history.
          fetch-depth: 0

      - name: Login to registry
        run: |
          mkdir -p ~/.docker
          printf '%s' '${{ secrets.REGISTRY_DOCKER_CONFIG }}' > ~/.docker/config.json

      - name: Build and push docs image
        env:
          REGISTRY_IMAGE: ${{ secrets.DOCS_REGISTRY_IMAGE }}
          # Sibling paradoc clone — URL + ref live in secrets so this
          # workflow file carries no host information. paradoc-clone is
          # public-readable over HTTPS so no token is needed; this is
          # also why we don't use SSH (port 2222 is blocked from inside
          # the build sandbox — verified empirically).
          PARADOC_GIT_URL: ${{ secrets.PARADOC_GIT_URL }}
          PARADOC_REF: ${{ secrets.PARADOC_REF }}
        run: |
          if [ -z "$REGISTRY_IMAGE" ]; then
            echo "::error::DOCS_REGISTRY_IMAGE secret is not set on this repo. Configure it (and REGISTRY_DOCKER_CONFIG) under Settings → Actions → Secrets before re-running."
            exit 1
          fi
          if [ -z "$PARADOC_GIT_URL" ]; then
            echo "::error::PARADOC_GIT_URL secret is not set. Set it to the HTTPS clone URL of the paradoc repo (public-readable; no token required)."
            exit 1
          fi
          TAG="sha-${GITHUB_SHA::7}"
          BRANCH_TAG="branch-$(printf '%s' "$GITHUB_REF_NAME" | tr '/' '-')"
          docker build \
            -f deploy/Dockerfile.docs \
            --build-arg "IMAGE_TAG=${TAG}" \
            --build-arg "PARADOC_GIT_URL=${PARADOC_GIT_URL}" \
            --build-arg "PARADOC_REF=${PARADOC_REF:-main}" \
            --build-arg "CACHE_BUST=${GITHUB_RUN_ID}" \
            -t "${REGISTRY_IMAGE}:${TAG}" \
            -t "${REGISTRY_IMAGE}:${BRANCH_TAG}" \
            .
          docker push "${REGISTRY_IMAGE}:${TAG}"
          docker push "${REGISTRY_IMAGE}:${BRANCH_TAG}"

  gitops:
    needs: [viewer-build, worker-build, docs-build]
    # Run when at least one build succeeded; tolerate the others being
    # skipped (paths didn't match) or failed (we still want to roll
    # whatever did build).
    if: |
      always() &&
      (needs.viewer-build.result == 'success' || needs.worker-build.result == 'success' || needs.docs-build.result == 'success')
    runs-on: docker-build
    steps:
      - name: Update gitops manifest
        env:
          GITOPS_REMOTE: ${{ secrets.GITOPS_REMOTE }}
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
          GITOPS_BRANCH: ${{ secrets.GITOPS_BRANCH }}
          # Per-image manifest paths. Viewer + worker share the same
          # Helm values file (workloads/adapy-viewer/values.yaml); docs
          # has its own deployment manifest. apply_bump operates on
          # whichever manifest is passed in.
          VIEWER_GITOPS_MANIFEST: ${{ secrets.VIEWER_GITOPS_MANIFEST }}
          DOCS_GITOPS_MANIFEST: ${{ secrets.DOCS_GITOPS_MANIFEST }}
          VIEWER_IMAGE: ${{ secrets.VIEWER_REGISTRY_IMAGE }}
          WORKER_IMAGE: ${{ secrets.WORKER_REGISTRY_IMAGE }}
          DOCS_IMAGE: ${{ secrets.DOCS_REGISTRY_IMAGE }}
          VIEWER_RESULT: ${{ needs.viewer-build.result }}
          WORKER_RESULT: ${{ needs.worker-build.result }}
          DOCS_RESULT: ${{ needs.docs-build.result }}
        run: |
          # Skip cleanly if the gitops core isn't configured. POSIX-only
          # — runner default shell is sh. Per-image manifest paths are
          # checked alongside their build result below, not here.
          MISSING=""
          for v in GITOPS_REMOTE GITOPS_TOKEN GITOPS_BRANCH; do
            eval "val=\$$v"
            [ -z "$val" ] && MISSING="$MISSING $v"
          done
          if [ -n "$MISSING" ]; then
            echo "Missing gitops secrets:$MISSING — skipping write-back."
            exit 0
          fi

          TAG="sha-${GITHUB_SHA::7}"
          WORK=$(mktemp -d)
          cd "$WORK"
          git clone --branch "$GITOPS_BRANCH" \
            "https://x-access-token:${GITOPS_TOKEN}@${GITOPS_REMOTE}" .
          git config user.name "Forgejo CI"
          git config user.email "ci@local"

          # Helm-shape bump: find an exact `repository: <IMAGE>` line,
          # rewrite the next `tag:` line. Indentation preserved; later
          # repository: blocks (e.g. the other image) untouched.
          bump_tag() {
            awk -v img="$1" -v tag="$2" '
              BEGIN { found=0 }
              {
                s = $0
                sub(/^[[:space:]]*/, "", s); sub(/[[:space:]]*$/, "", s)
                if (!found && s == "repository: " img) { found=1; print; next }
                if (found && $0 ~ /^[[:space:]]*tag:[[:space:]]/) {
                  sub(/tag:[[:space:]]*[^[:space:]]+/, "tag: " tag)
                  found=0
                }
                print
              }
            ' "$3" > "$3.tmp" && mv "$3.tmp" "$3"
          }

          # apply_bump prefers inline `image: repo:tag`, falls back to
          # the helm-values `repository:`/`tag:` shape. Operates on the
          # manifest path passed as $3 so the same function handles the
          # viewer/worker helm values file and the docs deployment.yaml.
          apply_bump() {
            image="$1"
            label="$2"
            manifest="$3"
            if [ -z "$image" ]; then
              echo "$label: registry image secret unset; skipping"
              return
            fi
            if [ -z "$manifest" ]; then
              echo "$label: gitops manifest secret unset; skipping"
              return
            fi
            if [ ! -f "$manifest" ]; then
              echo "$label: $manifest not present yet; skipping"
              return
            fi
            if grep -qF "image: ${image}:" "$manifest"; then
              sed -i "s|image: ${image}:.*|image: ${image}:${TAG}|" "$manifest"
            elif grep -qE "^[[:space:]]*repository:[[:space:]]+${image}[[:space:]]*$" "$manifest"; then
              bump_tag "$image" "$TAG" "$manifest"
            else
              echo "$label: no inline image: nor helm-shape repository: line for $image in $manifest — skipping"
            fi
          }

          summary=""
          i=1
          while [ "$i" -le 3 ]; do
            git pull --rebase origin "$GITOPS_BRANCH"

            # Re-run apply_bump on each retry against the freshly
            # rebased files; preserves correctness when concurrent
            # gitops commits land between attempts.
            summary=""
            manifests=""
            if [ "$VIEWER_RESULT" = "success" ]; then
              apply_bump "$VIEWER_IMAGE" viewer "$VIEWER_GITOPS_MANIFEST"
              summary="${summary}viewer "
              manifests="$manifests $VIEWER_GITOPS_MANIFEST"
            fi
            if [ "$WORKER_RESULT" = "success" ]; then
              # viewer + worker share the same manifest; apply_bump is
              # idempotent so a second call is safe, but only add it to
              # the path list once.
              apply_bump "$WORKER_IMAGE" worker "$VIEWER_GITOPS_MANIFEST"
              summary="${summary}worker "
              case " $manifests " in *" $VIEWER_GITOPS_MANIFEST "*) ;; *) manifests="$manifests $VIEWER_GITOPS_MANIFEST" ;; esac
            fi
            if [ "$DOCS_RESULT" = "success" ]; then
              apply_bump "$DOCS_IMAGE" docs "$DOCS_GITOPS_MANIFEST"
              summary="${summary}docs "
              manifests="$manifests $DOCS_GITOPS_MANIFEST"
            fi
            summary="${summary% }"

            # ``git add`` tolerates unchanged paths; the diff-cached
            # check below decides whether anything is actually staged.
            # shellcheck disable=SC2086
            [ -n "$manifests" ] && git add $manifests
            if git diff --cached --quiet; then
              echo "No image change to commit."
              exit 0
            fi
            git commit -m "[skip ci] ci: bump ${summary} image(s) to ${TAG}"
            if git push origin "HEAD:$GITOPS_BRANCH"; then
              exit 0
            fi
            echo "Push failed (attempt $i), retrying..."
            git reset --hard "origin/$GITOPS_BRANCH"
            sleep 2
            i=$((i+1))
          done
          echo "Failed to push after 3 attempts" >&2
          exit 1
