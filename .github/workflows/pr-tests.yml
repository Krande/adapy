name: Pull Request Tests

on:
  pull_request:
    branches:
      - main

# Use concurrency to ensure that only one instance of this workflow is running at a time
concurrency:
  group: pr-tests-${{ github.ref_name }}
  cancel-in-progress: true

# installs mamba-org/setup-micromamba@v2 on all 3 platforms using matrix and runs pytest:
jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v7
            with:
              ref: ${{ github.event.pull_request.head.sha || github.ref }}

          - uses: prefix-dev/setup-pixi@v0.10.0 # https://github.com/prefix-dev/setup-pixi
            with:
              pixi-version: v0.68.0
              cache: true
              environments: lint

          # NOT `pixi run lint`: that is black + `ruff check --fix` + isort, which all MUTATE the
          # runner's checkout and exit 0 — so this job reformatted a throwaway copy and passed
          # unconditionally. lint-check reports instead of rewriting.
          - run: pixi run lint-check

    test:
        runs-on: ${{ matrix.os }}
        defaults:
          run:
            shell: bash -l {0}
        strategy:
          fail-fast: false
          matrix:
            os: [ubuntu-latest, windows-latest, macos-latest]
        steps:
        - uses: actions/checkout@v7
          with:
            ref: ${{ github.event.pull_request.head.sha || github.ref }}

        - uses: prefix-dev/setup-pixi@v0.10.0
          with:
            pixi-version: v0.68.0
            environments: tests
            cache: true

        - name: Runs Tests
          run: pixi run -e tests test