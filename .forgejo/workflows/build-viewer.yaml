name: Build viewer image

# Runs only on the self-hosted runner labelled `docker-build`. GitHub Actions
# does not have that label, so this workflow is a no-op when the branch is
# pushed to GitHub. All registry/gitops endpoints come from secrets so the
# workflow file itself reveals no infrastructure details.

on:
  workflow_dispatch:
  push:
    branches: [chore/fea-report-v2]
    paths:
      - 'src/ada/__init__.py'
      - 'src/ada/config.py'
      - 'src/ada/comms/**'
      - 'src/frontend/**'
      - 'deploy/Dockerfile.viewer'
      - 'deploy/Dockerfile.worker'
      - 'pixi.toml'
      - 'pixi.lock'
      - '.forgejo/workflows/build-viewer.yaml'

jobs:
  build:
    runs-on: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Login to registry
        run: |
          mkdir -p ~/.docker
          printf '%s' '${{ secrets.REGISTRY_DOCKER_CONFIG }}' > ~/.docker/config.json

      - name: Build and push viewer image
        env:
          REGISTRY_IMAGE: ${{ secrets.VIEWER_REGISTRY_IMAGE }}
        run: |
          if [ -z "$REGISTRY_IMAGE" ]; then
            echo "::error::VIEWER_REGISTRY_IMAGE secret is not set on this repo. Configure it (and REGISTRY_DOCKER_CONFIG) under Settings → Actions → Secrets before re-running."
            exit 1
          fi
          TAG="sha-${GITHUB_SHA::7}"
          BRANCH_TAG="branch-$(printf '%s' "$GITHUB_REF_NAME" | tr '/' '-')"
          docker build \
            -f deploy/Dockerfile.viewer \
            -t "${REGISTRY_IMAGE}:${TAG}" \
            -t "${REGISTRY_IMAGE}:${BRANCH_TAG}" \
            .
          docker push "${REGISTRY_IMAGE}:${TAG}"
          docker push "${REGISTRY_IMAGE}:${BRANCH_TAG}"

      - name: Build and push worker image
        env:
          WORKER_REGISTRY_IMAGE: ${{ secrets.WORKER_REGISTRY_IMAGE }}
        run: |
          if [ -z "$WORKER_REGISTRY_IMAGE" ]; then
            echo "WORKER_REGISTRY_IMAGE secret not set; skipping worker image build."
            exit 0
          fi
          TAG="sha-${GITHUB_SHA::7}"
          BRANCH_TAG="branch-$(printf '%s' "$GITHUB_REF_NAME" | tr '/' '-')"
          docker build \
            -f deploy/Dockerfile.worker \
            -t "${WORKER_REGISTRY_IMAGE}:${TAG}" \
            -t "${WORKER_REGISTRY_IMAGE}:${BRANCH_TAG}" \
            .
          docker push "${WORKER_REGISTRY_IMAGE}:${TAG}"
          docker push "${WORKER_REGISTRY_IMAGE}:${BRANCH_TAG}"

      - name: Update gitops manifests
        env:
          GITOPS_REMOTE: ${{ secrets.GITOPS_REMOTE }}
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
          GITOPS_BRANCH: ${{ secrets.GITOPS_BRANCH }}
          VIEWER_MANIFEST: ${{ secrets.VIEWER_GITOPS_MANIFEST }}
          VIEWER_IMAGE: ${{ secrets.VIEWER_REGISTRY_IMAGE }}
          WORKER_MANIFEST: ${{ secrets.WORKER_GITOPS_MANIFEST }}
          WORKER_IMAGE: ${{ secrets.WORKER_REGISTRY_IMAGE }}
        run: |
          # Skip cleanly if the gitops core (remote/token/branch) isn't
          # configured. POSIX-only — runner default shell is sh.
          MISSING=""
          for v in GITOPS_REMOTE GITOPS_TOKEN GITOPS_BRANCH; do
            eval "val=\$$v"
            [ -z "$val" ] && MISSING="$MISSING $v"
          done
          if [ -n "$MISSING" ]; then
            echo "Missing gitops core secrets:$MISSING — skipping write-back."
            exit 0
          fi

          TAG="sha-${GITHUB_SHA::7}"
          WORK=$(mktemp -d)
          cd "$WORK"
          git clone --branch "$GITOPS_BRANCH" \
            "https://x-access-token:${GITOPS_TOKEN}@${GITOPS_REMOTE}" .
          git config user.name "Forgejo CI"
          git config user.email "ci@local"

          # Apply image:tag bumps in $1 (manifest) for the image at $2.
          # Two supported formats:
          #   helm values:   `  tag: sha-XXXXXXX`       (preferred)
          #   raw deployment:`  image: <repo>:sha-XXX`  (image-targeted)
          # The image-targeted form is unambiguous when multiple image
          # tags coexist in one file; the helm form rewrites every
          # `tag: sha-...` line, which is fine when both images share
          # the build SHA (they do — same workflow run).
          apply_bump() {
            manifest="$1"
            image="$2"
            label="$3"
            if [ -z "$manifest" ] || [ -z "$image" ]; then
              return 0
            fi
            if [ ! -f "$manifest" ]; then
              echo "$manifest not present yet; skipping $label."
              return 0
            fi
            if grep -qF "image: ${image}:" "$manifest"; then
              sed -i "s|image: ${image}:.*|image: ${image}:${TAG}|" "$manifest"
            elif grep -qE "^[[:space:]]+tag:[[:space:]]+sha-" "$manifest"; then
              sed -i "s|^\([[:space:]]*tag:[[:space:]]*\)sha-[a-f0-9]*|\1${TAG}|" "$manifest"
            else
              echo "::error::No tag/image line matched in $manifest for $label"
              return 1
            fi
          }

          i=1
          while [ "$i" -le 3 ]; do
            git pull --rebase origin "$GITOPS_BRANCH"

            apply_bump "$VIEWER_MANIFEST" "$VIEWER_IMAGE" "viewer" || exit 1
            apply_bump "$WORKER_MANIFEST" "$WORKER_IMAGE" "worker" || exit 1

            # Stage only files that actually changed.
            [ -n "$VIEWER_MANIFEST" ] && [ -f "$VIEWER_MANIFEST" ] && git add "$VIEWER_MANIFEST"
            [ -n "$WORKER_MANIFEST" ] && [ -f "$WORKER_MANIFEST" ] && git add "$WORKER_MANIFEST"

            if git diff --cached --quiet; then
              echo "No image changes to commit."
              exit 0
            fi
            git commit -m "[skip ci] ci: update adapy-viewer/worker to ${TAG}"
            if git push origin "HEAD:$GITOPS_BRANCH"; then
              exit 0
            fi
            echo "Push failed (attempt $i), retrying..."
            git reset --hard "origin/$GITOPS_BRANCH"
            sleep 2
            i=$((i+1))
          done
          echo "Failed to push after 3 attempts" >&2
          exit 1
