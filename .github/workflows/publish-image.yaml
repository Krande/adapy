name: Publish images

# Builds the adapy deploy images and pushes them to this repo's GitHub
# Container Registry namespace (ghcr.io/<owner>/adapy-<name>). Auth is the
# built-in GITHUB_TOKEN — no external secrets required (mirrors the paradoc
# publish-image.yaml pattern).
#
# Images:
#   adapy-viewer            deploy/Dockerfile.viewer       (FROM the adacpp wasm base)
#   adapy-worker            deploy/Dockerfile.worker
#   adapy-docs              deploy/Dockerfile.docs
#
# The OCCT→wasm wheel is no longer cross-compiled here. adacpp publishes its
# own reusable base image on tag (ghcr.io/krande/adacpp-wasm-base:<ver>, wheel
# + manifest under /out/); the viewer build FROMs it via the ADACPP_WASM_BASE
# build-arg below. Bump that pin when adopting a newer adacpp release.
#
# We only push on tag: a tag push `v1.2.3` publishes :1.2.3, :1.2, :latest and
# :sha-<short> for every image. workflow_dispatch is available for manual
# re-runs but is not part of the normal release flow.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

# The prebuilt adacpp pyodide wasm base the viewer FROMs. Published by adacpp's
# own publish-wasm-base workflow on tag (wheel + manifest under /out/). Pinned
# to a release so viewer builds are reproducible — bump on adacpp adoption.
# NOTE: this is a cross-repo ghcr package; it must be public (or grant the
# adapy repo read access) for the GITHUB_TOKEN pull below to resolve it.
env:
  # 0.8.0 adds the build_advanced_face_* verbs the SAT→GLB path needs.
  ADACPP_WASM_BASE: ghcr.io/krande/adacpp-wasm-base:0.8.0

jobs:
  viewer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-viewer
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deploy/Dockerfile.viewer
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_TAG=${{ steps.meta.outputs.version }}
            ADACPP_BASE_IMAGE=${{ env.ADACPP_WASM_BASE }}
          cache-from: type=gha,scope=viewer
          cache-to: type=gha,mode=max,scope=viewer

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-worker
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deploy/Dockerfile.worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_TAG=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # docs/conf.py derives the footer release string from git describe,
          # so the build needs tags (passed in as ADA_DOCS_RELEASE/_DATE).
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-docs
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Resolve docs release metadata
        id: docsmeta
        run: |
          echo "release=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
          echo "date=$(git show -s --format=%ad --date=short)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deploy/Dockerfile.docs
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_TAG=${{ steps.meta.outputs.version }}
            ADA_DOCS_RELEASE=${{ steps.docsmeta.outputs.release }}
            ADA_DOCS_DATE=${{ steps.docsmeta.outputs.date }}
          cache-from: type=gha,scope=docs
          cache-to: type=gha,mode=max,scope=docs
