name: Build adacpp-wasm base image

# Builds the cached output of the OCCT-wasm cross-compile that
# Dockerfile.viewer's first stage now pulls from instead of
# recompiling. Registry endpoint and image name come from secrets so
# this workflow file reveals no infrastructure details.
#
# Triggered:
#   * manually via workflow_dispatch — pin a specific adacpp ref via
#     the `adacpp_ref` input;
#   * automatically when this workflow file or Dockerfile.adacpp-wasm
#     change, so the dockerfile and the produced image stay in sync.
#
# Two tags get pushed:
#   * ``adacpp-<sha7>`` — short git sha of the adacpp commit that
#                          was actually built (read out of /out/
#                          inside the image); this is the durable
#                          tag Dockerfile.viewer pins against.
#   * ``latest``        — convenience tag, fine for "re-trigger
#                          and grab the new wasm right now" but
#                          don't pin to it from anything that wants
#                          reproducible builds.

on:
  workflow_dispatch:
    inputs:
      adacpp_ref:
        description: "adacpp git ref (branch / tag / sha)"
        required: false
        default: "feat/cad-handler"
  push:
    branches: [chore/fea-report-v2, main]
    paths:
      - 'deploy/Dockerfile.adacpp-wasm'
      - '.forgejo/workflows/build-adacpp-base.yaml'

jobs:
  build:
    runs-on: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Login to registry
        run: |
          mkdir -p ~/.docker
          printf '%s' '${{ secrets.REGISTRY_DOCKER_CONFIG }}' > ~/.docker/config.json

      - name: Resolve adacpp ref
        id: ref
        run: |
          # Push events use the workflow's ADACPP_REF secret (or fall
          # back to the Dockerfile default). workflow_dispatch lets the
          # operator override at trigger time.
          REF="${{ github.event.inputs.adacpp_ref }}"
          if [ -z "$REF" ]; then
            REF="${{ secrets.ADACPP_REF }}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Resolved adacpp_ref=${REF:-<dockerfile default>}"

      - name: Build adacpp-wasm base
        env:
          REGISTRY_IMAGE: ${{ secrets.ADACPP_BASE_REGISTRY_IMAGE }}
          ADACPP_REF: ${{ steps.ref.outputs.ref }}
        run: |
          if [ -z "$REGISTRY_IMAGE" ]; then
            echo "::error::ADACPP_BASE_REGISTRY_IMAGE secret is not set. Configure it under Settings → Actions → Secrets before re-running."
            exit 1
          fi
          BUILD_ARGS=""
          if [ -n "$ADACPP_REF" ]; then
            BUILD_ARGS="--build-arg ADACPP_REF=${ADACPP_REF}"
          fi
          # Build into a temporary tag so we can read the resolved
          # adacpp sha out of the image before deciding the durable
          # tag name.
          docker build \
            -f deploy/Dockerfile.adacpp-wasm \
            ${BUILD_ARGS} \
            -t "${REGISTRY_IMAGE}:staging" \
            .

      - name: Tag and push
        env:
          REGISTRY_IMAGE: ${{ secrets.ADACPP_BASE_REGISTRY_IMAGE }}
        run: |
          set -e
          # The published image is ``FROM scratch`` (just /out/), so
          # ``docker run --entrypoint cat`` fails — there's no /bin/cat
          # in scratch. Use ``docker create`` + ``docker cp`` instead;
          # neither executes anything inside the image, just extracts
          # the file from the container layer.
          cid=$(docker create "${REGISTRY_IMAGE}:staging")
          trap 'docker rm "$cid" >/dev/null 2>&1 || true' EXIT
          docker cp "${cid}:/out/adacpp.sha" /tmp/adacpp.sha
          SHA=$(cut -c1-7 < /tmp/adacpp.sha | tr -d '[:space:]')
          if [ -z "$SHA" ]; then
            echo "::error::Couldn't extract adacpp sha from /out/adacpp.sha"
            exit 1
          fi
          DURABLE="adacpp-${SHA}"
          echo "Tagging as ${DURABLE} + latest"
          docker tag "${REGISTRY_IMAGE}:staging" "${REGISTRY_IMAGE}:${DURABLE}"
          docker tag "${REGISTRY_IMAGE}:staging" "${REGISTRY_IMAGE}:latest"
          docker push "${REGISTRY_IMAGE}:${DURABLE}"
          docker push "${REGISTRY_IMAGE}:latest"
          echo "Pushed ${REGISTRY_IMAGE}:${DURABLE} (and :latest)"
