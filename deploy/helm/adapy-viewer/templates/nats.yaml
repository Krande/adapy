{{- if .Values.nats.enabled -}}
{{- $name := include "adapy-viewer.natsFullname" . -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "adapy-viewer.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  type: ClusterIP
  ports:
    - name: client
      port: {{ .Values.nats.service.clientPort }}
      targetPort: client
      protocol: TCP
    - name: monitor
      port: {{ .Values.nats.service.monitorPort }}
      targetPort: monitor
      protocol: TCP
  selector:
    {{- include "adapy-viewer.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nats
---
{{- if .Values.nats.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}-data
  labels:
    {{- include "adapy-viewer.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.nats.persistence.size | quote }}
  {{- with .Values.nats.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "adapy-viewer.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "adapy-viewer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nats
  template:
    metadata:
      labels:
        {{- include "adapy-viewer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nats
    spec:
      containers:
        - name: nats
          image: "{{ .Values.nats.image.repository }}:{{ .Values.nats.image.tag }}"
          imagePullPolicy: {{ .Values.nats.image.pullPolicy }}
          args:
            - "-js"
            - "-sd"
            - "/data"
            - "-m"
            - "{{ .Values.nats.service.monitorPort }}"
            - "-p"
            - "{{ .Values.nats.service.clientPort }}"
          ports:
            - name: client
              containerPort: {{ .Values.nats.service.clientPort }}
              protocol: TCP
            - name: monitor
              containerPort: {{ .Values.nats.service.monitorPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 2
            periodSeconds: 10
          resources: {{- toYaml .Values.nats.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.nats.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ $name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
